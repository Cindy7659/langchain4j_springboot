spring:
  application:
    name: spring_langchain4j
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 8
langchain4j:
  open-ai:
    chat-model:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api-key: ${API_KEY}
      model-name: qwen-plus
      log-requests: true
      log-responses: true
    streaming-chat-model:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api-key: ${API_KEY}
      model-name: qwen3.5-plus
      log-requests: true
      log-responses: true
logging:
  level:
    dev.langchain4j: debug


