spring:
  application:
    name: spring_langchain4j
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 8
langchain4j:
  open-ai:
    chat-model:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api-key: ${API_KEY}
      model-name: qwen-plus
      log-requests: true
      log-responses: true
    streaming-chat-model:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api-key: ${API_KEY}
      model-name: qwen3.5-plus
      log-requests: true
      log-responses: true
    embedding-model:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api-key: ${API_KEY}
      model-name: text-embedding-v4
      log-requests: true
      log-responses: true
      # text-embedding-v4模型限制了一次最多只能提交10个片段，所以这里设置成10告诉langchain4j
      max-segments-per-batch: 10
logging:
  level:
    dev.langchain4j: debug


